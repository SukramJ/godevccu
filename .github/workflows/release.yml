name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CGO_ENABLED: "0"
  GO_VERSION: "1.26"

jobs:
  meta:
    name: meta
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.meta.outputs.base }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
      - name: derive base version and prerelease flag
        id: meta
        # The tag may carry a pre-release suffix in either semver
        # (`v0.1.0-rc.1`) or PEP 440 (`v0.1.0b1`) shape. The base
        # version is always the leading MAJOR.MINOR.PATCH; anything
        # after that marks the tag as a prerelease and is dropped for
        # changelog lookup.
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          stripped="${tag#v}"
          base="$(echo "$stripped" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')"
          if [[ "$stripped" == "$base" ]]; then
            prerelease=false
          else
            prerelease=true
          fi
          echo "tag=$tag base=$base prerelease=$prerelease"
          echo "base=$base" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"
      - name: ensure changelog has the base entry
        run: |
          set -euo pipefail
          base="${{ steps.meta.outputs.base }}"
          if ! grep -qE "^## \\[${base}\\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a '## [${base}]' section"
            exit 1
          fi

  test:
    name: test
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go test -race
        # The race runtime requires CGo; production builds stay
        # CGo-free.
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

  build:
    name: build (${{ matrix.os }}-${{ matrix.arch }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          OUT="dist/godevccu-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath -ldflags="-s -w" -o "${OUT}" ./cmd/godevccu
          (cd dist && sha256sum "$(basename "${OUT}")" > "$(basename "${OUT}").sha256")
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/

  release:
    name: release
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binaries-*
          merge-multiple: true
      - name: extract changelog body for base version
        id: changelog
        # Pull the section between '## [<base>]' and the next '## ['
        # heading. Pre-release tags reuse the base version's body so
        # 0.1.0b1 / 0.1.0-rc.1 publish the same notes as 0.1.0.
        env:
          BASE: ${{ needs.meta.outputs.base }}
          TAG: ${{ github.ref_name }}
          IS_PRERELEASE: ${{ needs.meta.outputs.prerelease }}
        run: |
          set -euo pipefail
          {
            if [[ "$IS_PRERELEASE" == "true" ]]; then
              echo "_Pre-release ${TAG} based on changelog of ${BASE}._"
              echo
            fi
            awk -v ver="$BASE" '
              $0 ~ "^## \\[" ver "\\]" { flag = 1; next }
              /^## \[/                  { flag = 0 }
              flag                      { print }
            ' CHANGELOG.md
          } > release-notes.md
          cat release-notes.md
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: ${{ needs.meta.outputs.prerelease }}
